name: Deploy Spring Boot to EC2

on:
  workflow_dispatch:

jobs:
  #  Job 1: Test 
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Make mvnw executable
        run: chmod +x ./mvnw

      - name: Run tests
        run: ./mvnw -B test

  #  Job 2: Build 
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Make mvnw executable
        run: chmod +x ./mvnw

      - name: Build JAR (skip tests - already ran)
        run: ./mvnw -B package -DskipTests

      - name: Locate built JAR
        id: find_jar
        run: |
          JAR_PATH=$(find target -maxdepth 1 -name "*.jar" ! -name "*sources*" ! -name "*javadoc*" | head -1)
          echo "jar_path=$JAR_PATH" >> "$GITHUB_OUTPUT"
          echo "Found JAR: $JAR_PATH"

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: ${{ steps.find_jar.outputs.jar_path }}
          retention-days: 1
          if-no-files-found: error

  #  Job 3: Deploy 
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build

    env:
      TF_VAR_aws_region: ${{ secrets.AWS_REGION }}
      TF_VAR_project_name: ${{ secrets.PROJECT_NAME }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      #  Download the JAR built in the build job 
      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: ansible/jar/

      - name: Rename downloaded JAR to app.jar
        run: |
          cd ansible/jar
          JAR=$(find . -maxdepth 1 -name "*.jar" | head -1)
          if [ -z "$JAR" ]; then
            echo "ERROR: No JAR found in ansible/jar/" && exit 1
          fi
          if [ "$JAR" != "./app.jar" ]; then
            mv "$JAR" app.jar
          fi
          echo "JAR ready: $(ls -lh app.jar)"

      #  Configure AWS credentials 
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      #  Generate SSH key pair for this deploy 
      - name: Generate SSH key pair
        run: |
          ssh-keygen -t ed25519 -f "$HOME/.ssh/deploy_key" -N "" -C "deploy@${GITHUB_RUN_ID}"
          echo "SSH_PUBLIC_KEY=$(cat $HOME/.ssh/deploy_key.pub)" >> "$GITHUB_ENV"
          chmod 600 "$HOME/.ssh/deploy_key"

      #  Terraform: provision EC2 
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="key=${{ secrets.PROJECT_NAME }}/terraform.tfstate"

      - name: Terraform Apply
        working-directory: terraform
        run: |
          terraform apply -auto-approve \
            -var="public_key=${SSH_PUBLIC_KEY}" \
            -var="project_name=${{ secrets.PROJECT_NAME }}" \
            -var="aws_region=${{ secrets.AWS_REGION }}"

      - name: Capture Terraform outputs
        id: tf_outputs
        working-directory: terraform
        run: |
          SERVER_IP=$(terraform output -raw instance_public_ip)
          APP_URL=$(terraform output -raw app_url)
          echo "server_ip=$SERVER_IP" >> "$GITHUB_OUTPUT"
          echo "app_url=$APP_URL"     >> "$GITHUB_OUTPUT"
          echo "SERVER_IP=$SERVER_IP" >> "$GITHUB_ENV"
          echo "APP_URL=$APP_URL"     >> "$GITHUB_ENV"

      #  Wait for EC2 to become SSH-reachable 
      - name: Wait for SSH to be ready
        run: |
          echo "Waiting for SSH on $SERVER_IP:22 ..."
          for i in $(seq 1 30); do
            if nc -zw5 "$SERVER_IP" 22 2>/dev/null; then
              echo "SSH is up after $i attempts."
              exit 0
            fi
            echo "Attempt $i/30 - not ready yet, sleeping 10s ..."
            sleep 10
          done
          echo "ERROR: SSH never became reachable on $SERVER_IP" && exit 1

      #  Install Ansible 
      - name: Install Ansible
        run: |
          pip install --upgrade pip
          pip install "ansible>=9.0,<10.0"

      #  Run Ansible playbook 
      - name: Run Ansible playbook
        env:
          ANSIBLE_HOST_KEY_CHECKING: 'False'
        run: |
          ansible-playbook ansible/playbook.yml \
            -i "$SERVER_IP," \
            --private-key "$HOME/.ssh/deploy_key" \
            -u ec2-user \
            -e "jar_src=$GITHUB_WORKSPACE/ansible/jar/app.jar"

      #  Self-verify: hit the app endpoint 
      - name: Wait for application to start
        run: |-
          echo "Waiting for app to respond on $APP_URL ..."
          for i in $(seq 1 24); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 5 --max-time 10 "$APP_URL/" 2>/dev/null || true)
            echo "Attempt $i/24 - HTTP status: $STATUS"
            if echo "$STATUS" | grep -qE '^[23][0-9][0-9]$'; then
              echo "SUCCESS: App is responding with HTTP $STATUS"
              exit 0
            fi
            sleep 10
          done
          echo "ERROR: App did not respond with 2xx/3xx within the timeout window."
          echo "Final attempt response:"
          curl -v --connect-timeout 5 --max-time 10 "$APP_URL/" || true
          exit 1
